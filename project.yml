name: Muttr
options:
  bundleIdPrefix: ai.mattr
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.3"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"

packages:
  KeychainAccess:
    url: https://github.com/kishikawakatsumi/KeychainAccess.git
    from: "4.2.2"
  HotKey:
    url: https://github.com/soffes/HotKey.git
    from: "0.2.1"

targets:
  Muttr:
    type: application
    platform: macOS
    sources:
      - Muttr
    settings:
      base:
        INFOPLIST_FILE: Muttr/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Muttr/Resources/Muttr.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: ai.mattr.muttr
        CODE_SIGN_IDENTITY: "Muttr Development"
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
    dependencies:
      - package: KeychainAccess
      - package: HotKey
    entitlements:
      path: Muttr/Resources/Muttr.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
        com.apple.security.device.audio-input: true

  muttr:
    type: tool
    platform: macOS
    sources:
      - MuttrCLI
      - path: Muttr/Models
      - path: Muttr/App/AppConstants.swift
      - path: Muttr/Pipeline/Protocols/NarrationProviding.swift
      - path: Muttr/Pipeline/Protocols/TTSProviding.swift
      - path: Muttr/Pipeline/Protocols/AudioOutputProviding.swift
      - path: Muttr/Pipeline/Core/NarrationRouter.swift
      - path: Muttr/Pipeline/Core/UrgencyClassifier.swift
      - path: Muttr/Pipeline/Services/OllamaService.swift
      - path: Muttr/Pipeline/Services/TTSEngine.swift
      - path: Muttr/Pipeline/Services/AudioService.swift
      - path: Muttr/Pipeline/Services/SidecarTTSService.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ai.mattr.muttr.cli
        PRODUCT_NAME: muttr
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SKIP_INSTALL: NO
        SWIFT_OBJC_BRIDGING_HEADER: MuttrCLI/MuttrCLI-Bridging-Header.h
        CLANG_ENABLE_MODULES: YES
